            { name: '中医学(五年制)', count: '约6' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }
        ],
        '广西中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }, { name: '临床医学(五年制)', count: '约3' }
        ],
        '贵州中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }
        ],
        '云南中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }
        ],
        '陕西中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }, { name: '临床医学(五年制)', count: '约3' }
        ],
        '甘肃中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }, { name: '临床医学(五年制)', count: '约3' }
        ],
        '山西中医药大学': [
            { name: '中医学(五年制)', count: '约5' }, { name: '针灸推拿学(五年制)', count: '约3' },
            { name: '中西医临床医学', count: '约5' }, { name: '中药学', count: '约5' },
            { name: '护理学', count: '约5' }
        ],
    };

    // 按分数降序排列
    schools.sort((a, b) => b.score - a.score);

    // 渲染图例
    const legendContainer = document.getElementById('legend-container');
    tiers.forEach(t => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
            <div class="legend-dot" style="background:${t.color};box-shadow:0 0 8px ${t.color}"></div>
            <div class="legend-label">${t.name}</div>
            <div class="legend-score">${t.range}</div>
        `;
        legendContainer.appendChild(item);
    });

    // 渲染院校列表
    const schoolListEl = document.getElementById('school-list');
    const schoolCountEl = document.getElementById('school-count');
    schoolCountEl.textContent = `共加载 ${schools.length} 所院校`;

    function renderSchoolList(filterText = '') {
        const searchTerm = filterText.toLowerCase();
        const filtered = schools.filter(s =>
            !searchTerm ||
            s.name.includes(searchTerm) ||
            s.province.includes(searchTerm) ||
            s.city.includes(searchTerm)
        );
        schoolListEl.innerHTML = '';
        filtered.forEach((s, idx) => {
            const tierInfo = tiers.find(t => t.id === s.tier);
            const div = document.createElement('div');
            div.className = 'school-item';
            div.dataset.schoolIdx = schools.indexOf(s);
            const shMajors = majorsMap[s.name] || [];
            const shMajorCount = shMajors.length;
            const shFirstMajors = shMajors.slice(0, 3).map(m => m.name).join('、');
            div.innerHTML = `
                <div class="school-rank" style="background:${tierInfo.bg};color:${tierInfo.color};font-size:11px;">${schools.indexOf(s) + 1}</div>
                <div class="school-info">
                    <div class="school-name">${s.name}</div>
                    <div class="school-location">${s.province} ${s.city} · ${s.note}</div>
                    <div class="school-location" style="color:#60a5fa;font-size:10px;margin-top:1px;">${shMajorCount}个专业: ${shFirstMajors}${shMajorCount > 3 ? '...' : ''}</div>
                </div>
                <div class="school-score" style="color:${tierInfo.color}">${s.score}分</div>
            `;
            div.addEventListener('click', () => {
                const schoolIdx = schools.indexOf(s);
                highlightSchool(schoolIdx);
                if (myChart) {
                    // 根据等级找到对应的seriesIndex（effectScatter在index 0, 然后是s/a/b/c/d在1-5）
                    const tierIdx = ['s','a','b','c','d'].indexOf(s.tier);
                    if (tierIdx >= 0) {
                        const seriesIdx = tierIdx + 1;
                        // 找到该school在对应series中的dataIndex
                        const series = myChart.getOption().series[seriesIdx];
                        if (series && series.data) {
                            const dataIdx = series.data.findIndex(d => d.value && d.value[3] === schoolIdx);
                            if (dataIdx >= 0) {
                                myChart.dispatchAction({ type: 'showTip', seriesIndex: seriesIdx, dataIndex: dataIdx });
                            }
                        }
                    }
                }
            });
            schoolListEl.appendChild(div);
        });
    }

    function highlightSchool(idx) {
        document.querySelectorAll('.school-item').forEach(el => el.classList.remove('selected'));
        const target = document.querySelector(`.school-item[data-school-idx="${idx}"]`);
        if (target) {
            target.classList.add('selected');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    renderSchoolList();

    // 搜索功能
    document.getElementById('search-input').addEventListener('input', (e) => {
        renderSchoolList(e.target.value);
    });

    // ============================================================
    // ECharts 中国地图
    // ============================================================
    let myChart = null;

    function initMap() {
        const container = document.getElementById('map-chart');
        myChart = echarts.init(container);

        // 加载中国地图GeoJSON（本地文件，避免外部网络依赖）
        fetch('./china.json')
            .then(res => res.json())
            .then(chinaGeo => {
                echarts.registerMap('china', chinaGeo);

                const schoolData = schools.map((s, idx) => ({
                    name: s.name,
                    value: [...s.coord, s.score, idx],
                    tier: s.tier,
                    province: s.province,
                    city: s.city,
                    score: s.score,
                    note: s.note,
                }));

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'item',
                        className: 'tooltip-custom',
                        backgroundColor: 'rgba(16, 24, 60, 0.96)',
                        borderColor: 'rgba(100, 140, 255, 0.5)',
                        textStyle: { color: '#e2e8f0', fontSize: 13 },
                        formatter: function(params) {
                            if (params.seriesType === 'scatter' || params.seriesType === 'effectScatter') {
                                const d = params.data;
                                const tierInfo = tiers.find(t => t.id === d.tier);
                                const majors = majorsMap[d.name] || [];
                                const totalMajors = majors.length;
                                // 计算预估总招生人数
                                let totalCount = 0;
                                let hasExactData = false;
                                majors.forEach(m => {
                                    const c = String(m.count);
                                    if (c.startsWith('约')) {
                                        totalCount += parseInt(c.replace('约','')) || 0;
                                    } else {
                                        const parts = c.split('+');
                                        parts.forEach(p => { totalCount += parseInt(p) || 0; });
                                        hasExactData = true;
                                    }
                                });
                                const countNote = hasExactData ? '(部分精确数据)' : '(预估值)';
                                let majorsHtml = '';
                                if (majors.length > 0) {
                                    majorsHtml = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(100,140,255,0.2);">
                                        <div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">招生专业 (${totalMajors}个) | 约${totalCount}人${countNote}</div>
                                        <div style="display:flex;flex-wrap:wrap;gap:3px 8px;max-height:180px;overflow-y:auto;">`;
                                    majors.slice(0, 12).forEach(m => {
                                        majorsHtml += `<span style="font-size:11px;color:#cbd5e1;white-space:nowrap;">${m.name} <span style="color:#64748b;">${m.count}</span></span>`;
                                    });
                                    if (majors.length > 12) {
                                        majorsHtml += `<span style="font-size:11px;color:#60a5fa;">...共${totalMajors}个专业</span>`;
                                    }
                                    majorsHtml += `</div></div>`;
                                }
                                return `
                                    <div style="font-size:16px;font-weight:700;margin-bottom:6px;color:${tierInfo.color}">
                                        ${d.name}
                                    </div>
                                    <div style="color:#94a3b8;margin-bottom:2px;">${d.province} · ${d.city}</div>
                                    <div style="color:#94a3b8;margin-bottom:4px;">${d.note}</div>
                                    <div style="font-size:22px;font-weight:700;color:${tierInfo.color};">
                                        最低 ${d.score} 分
                                    </div>
                                    ${majorsHtml}
                                    <div style="font-size:11px;color:#64748b;margin-top:6px;">
                                        ${tierInfo.name} | 2025年河南物理类
                                    </div>
                                `;
                            }
                            return '';
                        }
                    },
                    geo: {
                        map: 'china',
                        roam: true,
                        zoom: 1.2,
                        center: [104.5, 35.5],
                        label: {
                            show: true,
                            fontSize: 10,
                            color: 'rgba(200, 210, 230, 0.6)',
                            fontFamily: 'PingFang SC, Microsoft YaHei, sans-serif',
                        },
                        itemStyle: {
                            areaColor: '#1a1f3a',
                            borderColor: 'rgba(80, 120, 200, 0.3)',
                            borderWidth: 1,
                            shadowColor: 'rgba(0, 0, 0, 0.4)',
                            shadowBlur: 10,
                        },
                        emphasis: {
                            label: {
                                show: true,
                                color: '#e2e8f0',
                                fontSize: 12,
                            },
                            itemStyle: {
                                areaColor: '#1e2a4a',
                                borderColor: 'rgba(100, 160, 255, 0.6)',
                                borderWidth: 1.5,
                            },
                        },
                        regions: [{
                            name: '河南',
                            itemStyle: {
                                areaColor: '#1e2d50',
                                borderColor: '#60a5fa',
                                borderWidth: 2,
                                shadowColor: 'rgba(96, 165, 250, 0.3)',
                                shadowBlur: 15,
                            },
                            label: {
                                show: true,
                                color: '#60a5fa',
                                fontSize: 13,
                                fontWeight: 'bold',
                            },
                        }],
                    },
                    series: [
                        // 底层光晕效果
                        {
                            type: 'effectScatter',
                            coordinateSystem: 'geo',
                            data: schoolData,
                            symbolSize: 8,
                            showEffectOn: 'render',
                            rippleEffect: {
                                brushType: 'stroke',
                                scale: 3,
                                period: 7,
                                color: '#60a5fa',
                            },
                            itemStyle: {
                                color: 'rgba(96, 165, 250, 0.3)',
                            },
                            zlevel: 1,
                            tooltip: { show: false },
                            silent: true,
                        },
                    ],
                };

                // 为每个等级分别创建scatter系列（用颜色区分等级）
                tiers.forEach(t => {
                    const tierData = schoolData.filter(d => d.tier === t.id);
                    option.series.push({
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        name: t.name,
                        data: tierData,
                        symbolSize: function(val) {
                            return 13 + val[2] * 0.002;
                        },
                        encode: { tooltip: [0, 1, 2, 3] },
                        itemStyle: {
                            color: t.color,
                            borderColor: 'rgba(255, 255, 255, 0.75)',
                            borderWidth: 1.5,
                            shadowBlur: 12,
                            shadowColor: t.color,
                        },
                        label: { show: false },
                        emphasis: {
                            scale: 1.8,
                            itemStyle: {
                                shadowBlur: 25,
                                shadowColor: t.color,
                                borderColor: '#fff',
                                borderWidth: 2,
                            },
                        },
                        zlevel: 2,
                    });
                });

                myChart.setOption(option);

                // 点击地图标记联动列表
                myChart.on('click', function(params) {
                    if (params.seriesType === 'scatter' && params.data && params.data.value) {
                        const idx = params.data.value[3];
                        if (idx !== undefined) {
                            highlightSchool(idx);
                        }
                    }
                });

                // 窗口缩放
                window.addEventListener('resize', () => myChart.resize());
            })
            .catch(err => {
                console.error('地图加载失败:', err);
                container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ef4444;font-size:16px;">地图数据加载失败，请检查网络连接后刷新页面</div>';
            });
    }

    initMap();
    </script>
